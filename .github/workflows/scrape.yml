name: Scrape Ctrip flights

# 7×24 free cron via GitHub Actions (public repo).
# Schedule: 18:00 UTC = 02:00 BJT (next morning). Roughly once a day.
# Manual trigger: Actions tab → "Run workflow".
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write    # so the bot can commit SQLite back
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m backend.scraper --lookahead 7 --delay 3

      - name: Summary
        run: |
          echo "Latest scrape_log entries:"
          sqlite3 backend/data.sqlite3 \
            "SELECT route, depdate_anchor, flights_count, calendar_count, status, finished_at
               FROM scrape_log ORDER BY id DESC LIMIT 12;" \
            || true

      - name: Commit SQLite back to repo
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add backend/data.sqlite3
          if git diff --cached --quiet; then
            echo "No SQLite changes to commit."
          else
            COUNTS=$(sqlite3 backend/data.sqlite3 \
              "SELECT 'routes='||COUNT(*) FROM meta_routes;")
            git commit -m "data: scrape $(date -u +%Y-%m-%d) UTC ($COUNTS)"
            git push
          fi

      - name: Upload SQLite artifact
        uses: actions/upload-artifact@v4
        with:
          name: flights-sqlite-${{ github.run_id }}
          path: backend/data.sqlite3
          retention-days: 90

      - name: Fail when scraper had no outputs (silent-fail guard)
        run: |
          ROW=$(sqlite3 backend/data.sqlite3 \
            "SELECT COUNT(*) FROM scrape_log WHERE finished_at > datetime('now','-6 hours');")
          if [ "$ROW" = "0" ]; then
            echo "::error::No scrape_log row inserted in the last 6 hours."
            exit 1
          fi
